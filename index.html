<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Tasin Shahriar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --sidebar-bg: #1a1d20; --accent: #007bff; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* Login System */
        #loginScreen { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%); 
        }
        .login-box { 
            background: white; padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; 
        }

        /* Sidebar Layout */
        #adminContent { display: none; }
        .sidebar { background: var(--sidebar-bg); min-height: 100vh; position: fixed; z-index: 100; transition: 0.3s; width: 16.66%; }
        .sidebar .nav-link { color: #adb5bd; padding: 15px 25px; border-radius: 0; text-align: left; cursor: pointer; border: none; background: none; display: block; width: 100%; text-decoration: none; }
        .sidebar .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .sidebar .nav-link.active { color: #fff; background: var(--accent); border-left: 5px solid #00d4ff; }
        
        .main-content { margin-left: 16.66%; padding: 40px; width: 83.33%; transition: 0.3s; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; min-height: auto; position: relative; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }

        .card { border: none; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <div class="text-center mb-4">
                <div class="bg-primary d-inline-block p-3 rounded-circle mb-3">
                    <i class="fas fa-user-shield text-white fa-2x"></i>
                </div>
                <h3 class="fw-bold">Admin Portal</h3>
            </div>

            <div id="loginInputs">
                <div class="mb-3">
                    <label class="form-label small fw-bold">PASSWORD</label>
                    <input type="password" id="adminPass" class="form-control" placeholder="••••••••">
                </div>
                <button onclick="checkPass()" class="btn btn-primary w-100 btn-lg">Login</button>
                <div class="text-center mt-3">
                    <a href="#" onclick="toggleView('forgot')" class="text-muted small text-decoration-none">Reset Password?</a>
                </div>
            </div>

            <div id="forgotSection" style="display: none;">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-danger">MASTER KEY</label>
                    <input type="text" id="securityKey" class="form-control" placeholder="Enter Secret Key">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">NEW PASSWORD</label>
                    <input type="password" id="newPass" class="form-control" placeholder="New Password">
                </div>
                <button onclick="resetPassword()" class="btn btn-danger w-100">Update Password</button>
                <div class="text-center mt-3"><a href="#" onclick="toggleView('login')" class="text-muted small">Back</a></div>
            </div>
        </div>
    </div>

    <div id="adminContent">
        <div class="row g-0">
            <nav class="sidebar shadow">
                <div class="p-4 text-white">
                    <h5 class="fw-bold mb-0">Tasin Shahriar</h5>
                    <small class="text-info">Portfolio Manager</small>
                </div>
                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                    <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#pane-dash"><i class="fas fa-home me-2"></i> Dashboard</button>
                    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#pane-manage" onclick="loadAdminAcademic()"><i class="fas fa-graduation-cap me-2"></i> Academic Records</button>
                    <hr class="text-white-50 mx-3">
                    <a href="index.html" class="nav-link text-info"><i class="fas fa-globe me-2"></i> View Website</a>
                    <button onclick="logout()" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
                </div>
            </nav>

            <main class="main-content">
                <div class="tab-content" id="v-pills-tabContent">
                    
                    <div class="tab-pane fade show active" id="pane-dash">
                        <h2 class="fw-bold mb-4">Welcome Back</h2>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="card p-4 bg-primary text-white shadow">
                                    <h6>Portfolio Records</h6>
                                    <h1 id="count-display">0</h1>
                                    <small>Total Marksheets & Certificates</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="pane-manage">
                        <div class="d-flex justify-content-between align-items-end mb-4">
                            <h2 class="fw-bold mb-0">Manage Records</h2>
                            <button onclick="loadAdminAcademic()" class="btn btn-sm btn-outline-secondary">Refresh List</button>
                        </div>
                        <div class="row g-4">
                            <div class="col-lg-5">
                                <div class="card p-4 shadow-sm">
                                    <h5>Add New Record</h5>
                                    <div class="mt-3">
                                        <label class="small fw-bold">DOCUMENT TITLE</label>
                                        <input type="text" id="rec-title" class="form-control mb-2" placeholder="e.g. HSC Marksheet">
                                        
                                        <label class="small fw-bold">RESULT / DESCRIPTION</label>
                                        <input type="text" id="rec-res" class="form-control mb-2" placeholder="e.g. GPA 5.00">
                                        
                                        <label class="small fw-bold">CATEGORY</label>
                                        <select id="rec-cat" class="form-select mb-2">
                                            <option>Marksheet</option>
                                            <option>Certificate</option>
                                            <option>Award</option>
                                        </select>
                                        
                                        <label class="small fw-bold">IMAGE URL</label>
                                        <input type="text" id="rec-img" class="form-control mb-3" placeholder="Direct link to image">
                                        
                                        <button onclick="addRecord()" class="btn btn-success w-100">Upload Record</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-lg-7">
                                <div class="card p-4 shadow-sm">
                                    <h5>Current Records</h5>
                                    <div id="admin-academic-list" class="list-group list-group-flush mt-3">
                                        <p class="text-muted">Loading records...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const ACADEMIC_API = 'https://sheetdb.io/api/v1/7242gnuv3w5kb';
        const MASTER_KEY = 'Tasin60';

        // 1. Authentication
        function checkPass() {
            const entered = document.getElementById('adminPass').value;
            const stored = localStorage.getItem('adminPass') || "1234";
            if (entered === stored) {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('adminContent').style.display = "block";
                sessionStorage.setItem('isLoggedIn', 'true');
                updateDashboardCount();
            } else {
                alert("Wrong password!");
            }
        }

        function resetPassword() {
            const key = document.getElementById('securityKey').value;
            const newP = document.getElementById('newPass').value;
            if (key === MASTER_KEY) {
                if(newP.length < 4) return alert("Password too short!");
                localStorage.setItem('adminPass', newP);
                alert("Password Updated!");
                toggleView('login');
            } else {
                alert("Invalid Master Key.");
            }
        }

        // 2. Manage Records Logic
        async function loadAdminAcademic() {
            const list = document.getElementById('admin-academic-list');
            try {
                const res = await fetch(ACADEMIC_API);
                const data = await res.json();
                
                document.getElementById('count-display').innerText = data.length;

                list.innerHTML = data.map(item => `
                    <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                        <div>
                            <span class="fw-bold text-dark">${item.title}</span><br>
                            <span class="badge bg-light text-dark border">${item.category}</span>
                        </div>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteRecord('${item.title}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = `<p class="text-danger">Error loading records.</p>`;
            }
        }

        async function addRecord() {
            const title = document.getElementById('rec-title').value;
            if(!title) return alert("Please enter a title");

            const payload = { data: [{
                title: title,
                result: document.getElementById('rec-res').value,
                category: document.getElementById('rec-cat').value,
                image_url: document.getElementById('rec-img').value
            }]};

            await fetch(ACADEMIC_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            alert("Record Added!");
            loadAdminAcademic();
            
            // Clear inputs
            document.getElementById('rec-title').value = "";
            document.getElementById('rec-res').value = "";
            document.getElementById('rec-img').value = "";
        }

        async function deleteRecord(title) {
            if(!confirm(`Delete "${title}"?`)) return;
            await fetch(`${ACADEMIC_API}/title/${title}`, { method: 'DELETE' });
            loadAdminAcademic();
        }

        // UI Helpers
        async function updateDashboardCount() {
            const res = await fetch(ACADEMIC_API);
            const data = await res.json();
            document.getElementById('count-display').innerText = data.length;
        }

        function toggleView(v) {
            document.getElementById('loginInputs').style.display = (v === 'login') ? 'block' : 'none';
            document.getElementById('forgotSection').style.display = (v === 'forgot') ? 'block' : 'none';
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            location.reload();
        }

        // Init
        if(sessionStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('loginScreen').style.display = "none";
            document.getElementById('adminContent').style.display = "block";
            updateDashboardCount();
        }
    </script>
</body>
</html>
